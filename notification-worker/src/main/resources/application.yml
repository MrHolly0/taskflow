server:
  port: ${NOTIFICATION_PORT:8082}

spring:
  application:
    name: taskflow-notification-worker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskflow}
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow}

app:
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    api-base-url: https://api.telegram.org
  notification:
    poll-interval-ms: 30000
    batch-size: 50
    max-retries: 3
