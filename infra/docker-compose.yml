services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-taskflow}
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow} -d ${DB_NAME:-taskflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-taskflow}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-taskflow}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy

  nlp-worker:
    build:
      context: ..
      dockerfile: nlp-worker/Dockerfile
    ports:
      - "${NLP_PORT:-8081}:8081"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NLP_PORT: 8081
    depends_on:
      redis:
        condition: service_healthy

  notification-worker:
    build:
      context: ..
      dockerfile: notification-worker/Dockerfile
    ports:
      - "${NOTIFICATION_PORT:-8082}:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-taskflow}
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflow}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      NOTIFICATION_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy

  core-service:
    build:
      context: ..
      dockerfile: core-service/Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-taskflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-taskflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-taskflow}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-taskflow}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-changeme-in-production}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-60}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      NLP_SERVICE_URL: http://nlp-worker:8081
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  miniapp:
    build:
      context: ../miniapp
      dockerfile: Dockerfile
    ports:
      - "${MINIAPP_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    depends_on:
      - core-service

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - core-service
      - miniapp
      - nlp-worker
      - notification-worker

volumes:
  postgres_data:
  nginx_cache:
