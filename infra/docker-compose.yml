services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-taskflow}
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow} -d ${DB_NAME:-taskflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-taskflow}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-taskflow}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@taskflow.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy

  nlp-worker:
    build:
      context: ../nlp-worker
      dockerfile: Dockerfile
    ports:
      - "${NLP_PORT:-8081}:8081"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NLP_PORT: 8081
    depends_on:
      redis:
        condition: service_healthy

  notification-worker:
    build:
      context: ../notification-worker
      dockerfile: Dockerfile
    ports:
      - "${NOTIFICATION_PORT:-8082}:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-taskflow}
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflow}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:}
      NOTIFICATION_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
