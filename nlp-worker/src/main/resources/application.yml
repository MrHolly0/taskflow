server:
  port: ${NLP_PORT:8081}

spring:
  application:
    name: taskflow-nlp-worker
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: https://api.groq.com/openai/v1
    llm-model: llama-3.3-70b-versatile
    whisper-model: whisper-large-v3
    connect-timeout-seconds: 5
    read-timeout-seconds: 30
  yandex-gpt:
    api-key: ${YANDEX_GPT_API_KEY:}
    base-url: https://llm.api.cloud.yandex.net/llm/v1
    model: yandexgpt-3
    folder-id: ${YANDEX_FOLDER_ID:}
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
