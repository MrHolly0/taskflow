spring:
  application:
    name: taskflow-core
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskflow}
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  mvc:
    problemdetails:
      enabled: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_must_be_at_least_32_characters_long}
    access-token-ttl-seconds: ${JWT_TTL_SECONDS:900}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    auth-date-max-age: ${TELEGRAM_AUTH_MAX_AGE:86400}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
    voice-dir: ${TELEGRAM_VOICE_DIR:/tmp/taskflow/voice}
  nlp:
    worker-url: ${NLP_WORKER_URL:http://localhost:8081}
    connect-timeout-seconds: 5
    read-timeout-seconds: 30

resilience4j:
  circuitbreaker:
    instances:
      nlp-worker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      nlp-worker:
        max-attempts: 3
        wait-duration: 500ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  info:
    title: TaskFlow API
    version: 1.0.0
    description: Digital task management assistant powered by AI

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
