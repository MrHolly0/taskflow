databaseChangeLog:
  - changeSet:
      id: 004-init-recurrences
      author: taskflow
      changes:
        - createTable:
            tableName: recurrences
            columns:
              - column:
                  name: task_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_recurrences_tasks
                    references: tasks(id)
                    deleteCascade: true
              - column:
                  name: type
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: interval_n
                  type: INT
                  defaultValueNumeric: 1
              - column:
                  name: days_of_week
                  type: VARCHAR(32)
              - column:
                  name: day_of_month
                  type: INT
              - column:
                  name: ends_at
                  type: TIMESTAMP WITH TIME ZONE
        - sql:
            sql: "ALTER TABLE recurrences ADD CONSTRAINT chk_recurrence_type CHECK (type IN ('DAILY', 'WEEKLY', 'MONTHLY', 'WEEKDAYS', 'CUSTOM'));"
