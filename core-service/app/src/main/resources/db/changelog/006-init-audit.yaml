databaseChangeLog:
  - changeSet:
      id: 006-init-task-events
      author: taskflow
      changes:
        - createTable:
            tableName: task_events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_events_tasks
                    references: tasks(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_events_users
                    references: users(id)
              - column:
                  name: event_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: delta
                  type: JSONB
              - column:
                  name: occurred_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
        - sql:
            sql: "ALTER TABLE task_events ADD CONSTRAINT chk_event_type CHECK (event_type IN ('CREATED', 'UPDATED', 'STATUS_CHANGED', 'DELETED'));"
        - createIndex:
            tableName: task_events
            indexName: idx_events_task_occurred
            columns:
              - column:
                  name: task_id
              - column:
                  name: occurred_at
                  descending: true
